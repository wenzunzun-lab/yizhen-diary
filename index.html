<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="format-detection" content="telephone=no">
<title>臻日记 · 每日记录</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
    background: #f0f7f0;
    color: #2d3a2d;
    padding: 16px;
    min-height: 100vh;
  }
  .container { max-width: 480px; margin: 0 auto; }

  .header {
    background: linear-gradient(135deg, #5b8c5a 0%, #7dab7c 50%, #a8d5a2 100%);
    border-radius: 24px;
    padding: 24px 20px 28px;
    margin-bottom: 16px;
    color: #fff;
    position: relative;
    overflow: hidden;
  }
  .header::before { content: "🌿"; position: absolute; right: -10px; top: -20px; font-size: 100px; opacity: 0.15; }
  .header::after { content: "🍃"; position: absolute; right: 30px; bottom: -15px; font-size: 60px; opacity: 0.12; }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
  .header-date { font-size: 14px; opacity: 0.9; background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; }
  .header-sub { font-size: 14px; opacity: 0.85; line-height: 1.5; }

  .card {
    background: #fff;
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 14px;
    box-shadow: 0 2px 16px rgba(91, 140, 90, 0.08);
    border: 1px solid rgba(91, 140, 90, 0.06);
  }
  .card-title { font-size: 16px; font-weight: 600; color: #3a5a3a; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

  /* 课表 */
  .schedule-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .schedule-table th { background: #e8f0e8; color: #3a5a3a; padding: 8px 6px; font-weight: 600; text-align: center; border-bottom: 2px solid #c8d8c8; }
  .schedule-table td { padding: 8px 6px; text-align: center; border-bottom: 1px solid #eef4ee; vertical-align: top; }
  .schedule-table .today-col { background: #eef7ee; }
  .schedule-table .today-col th { background: #5b8c5a; color: #fff; }
  .schedule-table .class-item { font-size: 12px; color: #5a6a5a; padding: 2px 0; }
  .schedule-table .class-item .time { color: #8a9a8a; font-size: 11px; }
  .schedule-table .no-class { color: #c8d8c8; font-size: 12px; }
  .schedule-table .highlight-text { color: #5b8c5a; font-weight: 600; }

  .week-selector { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .week-selector button { width: 36px; height: 36px; border-radius: 50%; border: none; background: #e8f0e8; color: #5b8c5a; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
  .week-selector button:active { background: #d0e4d0; }
  .week-selector span { font-size: 14px; color: #5b8c5a; font-weight: 500; }

  .progress-grid { display: flex; gap: 8px; margin-bottom: 10px; }
  .progress-item { flex: 1; height: 48px; border-radius: 14px; background: #eef4ee; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.3s; }
  .progress-item .label { font-size: 11px; color: #8a9a8a; }
  .progress-item.done { background: linear-gradient(135deg, #5b8c5a, #7dab7c); }
  .progress-item.done .label { color: rgba(255,255,255,0.9); }
  .progress-item.done .check { color: #fff; font-size: 14px; }
  .progress-text { text-align: center; font-size: 14px; color: #5b8c5a; font-weight: 500; }
  .progress-text strong { font-size: 18px; }

  .exercise-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .ex-btn { padding: 14px 8px; border: 2px solid #e8f0e8; border-radius: 14px; background: #fafcfa; text-align: center; font-size: 14px; font-weight: 500; color: #5a6a5a; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; user-select: none; }
  .ex-btn:active { transform: scale(0.96); }
  .ex-btn .icon { font-size: 22px; display: block; margin-bottom: 4px; }
  .ex-btn.active { border-color: #5b8c5a; background: #eef7ee; color: #3a6a3a; }

  .btn-primary { width: 100%; padding: 14px; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-green { background: linear-gradient(135deg, #5b8c5a, #7dab7c); color: #fff; }
  .btn-green:disabled { background: #d0d8d0; color: #9aae9a; cursor: not-allowed; transform: none; }
  .btn-gray { background: #e8f0e8; color: #8a9a8a; cursor: default; }

  .fund-grid { display: flex; gap: 10px; margin-bottom: 14px; }
  .fund-btn { flex: 1; padding: 16px 8px; border: 2px solid #e8f0e8; border-radius: 14px; background: #fafcfa; text-align: center; font-size: 14px; font-weight: 500; color: #5a6a5a; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; user-select: none; }
  .fund-btn:active { transform: scale(0.96); }
  .fund-btn .icon { font-size: 24px; display: block; margin-bottom: 4px; }
  .fund-btn.active-done { border-color: #5b8c5a; background: #eef7ee; color: #3a6a3a; }
  .fund-btn.active-not { border-color: #e8a87c; background: #fdf5ee; color: #c08060; }
  .btn-blue { background: linear-gradient(135deg, #6a9fb5, #8dbdd0); color: #fff; }
  .btn-blue:disabled { background: #d0d8d0; color: #9aae9a; cursor: not-allowed; transform: none; }

  .note-area { width: 100%; padding: 14px 16px; border: 2px solid #e8f0e8; border-radius: 14px; font-size: 15px; font-family: inherit; resize: none; height: 90px; outline: none; transition: border 0.2s; margin-bottom: 12px; background: #fafcfa; color: #2d3a2d; line-height: 1.6; }
  .note-area:focus { border-color: #7dab7c; }
  .note-area::placeholder { color: #b0c0b0; }
  .btn-save { width: 100%; padding: 12px; border: none; border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer; background: #e8f0e8; color: #5b8c5a; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
  .btn-save:active { background: #d0e4d0; }

  /* 总结TAB */
  .tab-bar { display: flex; gap: 8px; margin-bottom: 14px; }
  .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; background: #e8f0e8; color: #8a9a8a; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
  .tab-btn.active { background: #5b8c5a; color: #fff; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .summary-num { font-size: 28px; font-weight: 700; color: #5b8c5a; }
  .summary-label { font-size: 12px; color: #8a9a8a; }
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .summary-stat { text-align: center; padding: 12px; background: #fafcfa; border-radius: 12px; }

  .summary-note-item { padding: 10px 0; border-bottom: 1px solid #eef4ee; font-size: 14px; line-height: 1.6; }
  .summary-note-item .date { color: #8a9a8a; font-size: 12px; display: block; margin-bottom: 4px; }

  .summary-empty { text-align: center; color: #b0c0b0; padding: 30px 0; font-size: 14px; }

  .footer { text-align: center; padding: 16px 0 24px; }
  .btn-export { padding: 10px 28px; border: 1.5px solid #c8d8c8; border-radius: 20px; background: transparent; color: #8a9a8a; font-size: 13px; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
  .btn-export:active { background: #e8f0e8; border-color: #5b8c5a; color: #5b8c5a; }

  .toast-container { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; pointer-events: none; }
  .toast { background: rgba(45,58,45,0.92); color: #fff; padding: 14px 28px; border-radius: 16px; font-size: 15px; text-align: center; opacity: 0; transition: opacity 0.3s; max-width: 300px; backdrop-filter: blur(10px); }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="container">

  <!-- 头部 -->
  <div class="header">
    <div class="header-top">
      <h1>🌱 臻日记</h1>
      <span class="header-date" id="todayDate">---</span>
    </div>
    <div class="header-sub" id="todayGreeting">新的一天，从记录开始 📝</div>
  </div>

  <!-- 本周课表 -->
  <div class="card">
    <div class="card-title">📚 本周课表</div>
    <table class="schedule-table" id="scheduleTable">
      <thead><tr><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th></tr></thead>
      <tbody id="scheduleBody"></tbody>
    </table>
    <div style="margin-top: 14px; padding-top: 14px; border-top: 1px solid #eef4ee;">
      <div style="font-size: 13px; color: #5b8c5a; margin-bottom: 8px; font-weight: 500;">🌸 本周运动花朵</div>
      <div style="display: flex; gap: 6px;" id="flowerRow">
        <div class="flower-slot" data-day="0" style="flex:1;text-align:center;padding:8px 4px;background:#fafcfa;border-radius:10px;min-height:50px;">
          <div style="font-size:11px;color:#8a9a8a;margin-bottom:4px;">一</div>
          <div class="flower-icon" style="font-size:22px;line-height:1.2;"></div>
        </div>
        <div class="flower-slot" data-day="1" style="flex:1;text-align:center;padding:8px 4px;background:#fafcfa;border-radius:10px;min-height:50px;">
          <div style="font-size:11px;color:#8a9a8a;margin-bottom:4px;">二</div>
          <div class="flower-icon" style="font-size:22px;line-height:1.2;"></div>
        </div>
        <div class="flower-slot" data-day="2" style="flex:1;text-align:center;padding:8px 4px;background:#fafcfa;border-radius:10px;min-height:50px;">
          <div style="font-size:11px;color:#8a9a8a;margin-bottom:4px;">三</div>
          <div class="flower-icon" style="font-size:22px;line-height:1.2;"></div>
        </div>
        <div class="flower-slot" data-day="3" style="flex:1;text-align:center;padding:8px 4px;background:#fafcfa;border-radius:10px;min-height:50px;">
          <div style="font-size:11px;color:#8a9a8a;margin-bottom:4px;">四</div>
          <div class="flower-icon" style="font-size:22px;line-height:1.2;"></div>
        </div>
        <div class="flower-slot" data-day="4" style="flex:1;text-align:center;padding:8px 4px;background:#fafcfa;border-radius:10px;min-height:50px;">
          <div style="font-size:11px;color:#8a9a8a;margin-bottom:4px;">五</div>
          <div class="flower-icon" style="font-size:22px;line-height:1.2;"></div>
        </div>
        <div class="flower-slot" data-day="5" style="flex:1;text-align:center;padding:8px 4px;background:#fafcfa;border-radius:10px;min-height:50px;">
          <div style="font-size:11px;color:#8a9a8a;margin-bottom:4px;">六</div>
          <div class="flower-icon" style="font-size:22px;line-height:1.2;"></div>
        </div>
        <div class="flower-slot" data-day="6" style="flex:1;text-align:center;padding:8px 4px;background:#fafcfa;border-radius:10px;min-height:50px;">
          <div style="font-size:11px;color:#8a9a8a;margin-bottom:4px;">日</div>
          <div class="flower-icon" style="font-size:22px;line-height:1.2;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 周锻炼 -->
  <div class="card">
    <div class="week-selector">
      <button id="prevWeek">‹</button>
      <span id="weekLabel">本周</span>
      <button id="nextWeek">›</button>
    </div>
    <div class="card-title">🏋️ 本周目标 · 运动 4 次</div>
    <div class="progress-grid" id="progressGrid">
      <div class="progress-item" data-idx="0"><span class="check"></span><span class="label">第1次</span></div>
      <div class="progress-item" data-idx="1"><span class="check"></span><span class="label">第2次</span></div>
      <div class="progress-item" data-idx="2"><span class="check"></span><span class="label">第3次</span></div>
      <div class="progress-item" data-idx="3"><span class="check"></span><span class="label">第4次</span></div>
    </div>
    <div class="progress-text">已完成 <strong id="progressCount">0</strong> / 4 次</div>
  </div>

  <!-- 锻炼记录 -->
  <div class="card">
    <div class="card-title">🏃 记录今日运动</div>
    <div class="exercise-grid" id="exerciseGrid">
      <div class="ex-btn" data-type="跑步"><span class="icon">🏃</span>跑步</div>
      <div class="ex-btn" data-type="快走"><span class="icon">🚶</span>快走</div>
      <div class="ex-btn" data-type="瑜伽"><span class="icon">🧘</span>瑜伽</div>
      <div class="ex-btn" data-type="其他"><span class="icon">💪</span>其他</div>
    </div>
    <button class="btn-primary btn-green" id="btnExercise" disabled>✅ 记录今天运动</button>
  </div>

  <!-- 基金 -->
  <div class="card">
    <div class="card-title">💰 基金操作</div>
    <div class="fund-grid">
      <div class="fund-btn" data-fund="done"><span class="icon">✅</span>已处理</div>
      <div class="fund-btn" data-fund="not"><span class="icon">😅</span>忘了…</div>
    </div>
    <button class="btn-primary btn-blue" id="btnFund" disabled>📈 记录基金状态</button>
  </div>

  <!-- 笔记 -->
  <div class="card">
    <div class="card-title">📝 今日随记</div>
    <textarea class="note-area" id="noteInput" placeholder="写写今天的事…
上课情况、备课计划、下周安排…"></textarea>
    <button class="btn-save" id="btnSaveNote">💾 保存笔记</button>
  </div>

  <!-- 总结 -->
  <div class="card">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="weekSummary">📊 本周</button>
      <button class="tab-btn" data-tab="monthSummary">📈 本月</button>
    </div>
    <div class="tab-content active" id="weekSummary">
      <div class="summary-grid">
        <div class="summary-stat"><div class="summary-num" id="wsEx">0</div><div class="summary-label">运动次数</div></div>
        <div class="summary-stat"><div class="summary-num" id="wsFund">0</div><div class="summary-label">基金处理</div></div>
        <div class="summary-stat"><div class="summary-num" id="wsNotes">0</div><div class="summary-label">笔记篇数</div></div>
      </div>
      <div id="wsNotesList"></div>
    </div>
    <div class="tab-content" id="monthSummary">
      <div class="summary-grid">
        <div class="summary-stat"><div class="summary-num" id="msEx">0</div><div class="summary-label">运动次数</div></div>
        <div class="summary-stat"><div class="summary-num" id="msFund">0</div><div class="summary-label">基金处理</div></div>
        <div class="summary-stat"><div class="summary-num" id="msNotes">0</div><div class="summary-label">笔记篇数</div></div>
      </div>
      <div id="msNotesList"></div>
    </div>
  </div>

  <!-- 底部 -->
  <div class="footer">
    <button class="btn-export" id="btnExport">📤 导出数据</button>
    <div style="margin-top:10px;font-size:11px;color:#b0c0b0;">数据只存在此手机，隐私安全 🔒</div>
  </div>
</div>

<div class="toast-container"><div class="toast" id="toast"></div></div>

<script>
// ====== 数据 ======
const KEY = 'zhendiary_v3';
function load() {
  // 兼容旧版本数据（v1/v2用的KEY不一样）
  let raw;
  try { raw = JSON.parse(localStorage.getItem(KEY)) || {}; } catch { raw = {}; }
  if (!raw.records || Object.keys(raw.records).length === 0) {
    // 尝试从旧版本迁移
    for (const oldKey of ['zhendiary_records', 'zhendiary_v3', 'yizhen_daily_records']) {
      try {
        const old = JSON.parse(localStorage.getItem(oldKey));
        if (old && old.records && Object.keys(old.records).length > 0) {
          raw = old;
          localStorage.setItem(KEY, JSON.stringify(raw));
          localStorage.removeItem(oldKey);
          break;
        }
      } catch {}
    }
  }
  if (!raw.records) raw.records = {};
  return raw;
}
function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }
function getDay(ds) { const d = load(); if (!d.records[ds]) d.records[ds] = { ex: null, ext: '', fund: null, note: '' }; return d.records[ds]; }
function setDay(ds, k, v) { const d = load(); if (!d.records[ds]) d.records[ds] = { ex: null, ext: '', fund: null, note: '' }; d.records[ds][k] = v; save(d); }

function getWeekId(date) { const d = new Date(date); const day = d.getDay(); const diff = d.getDate() - day + (day === 0 ? -6 : 1); const m = new Date(d.setDate(diff)); return m.toISOString().split('T')[0]; }
function fmtDate(date) { const y = date.getFullYear(); const m = String(date.getMonth()+1).padStart(2,'0'); const d = String(date.getDate()).padStart(2,'0'); return y+'-'+m+'-'+d; }
function weekLabel(wid) { const s = new Date(wid+'T00:00:00'); const e = new Date(s); e.setDate(e.getDate()+6); return (s.getMonth()+1)+'/'+s.getDate()+' — '+(e.getMonth()+1)+'/'+e.getDate(); }
function weekData(wid) { const d = load(); const s = new Date(wid+'T00:00:00'); const arr = []; for (let i=0;i<7;i++) { const dd = new Date(s); dd.setDate(dd.getDate()+i); const ds = fmtDate(dd); arr.push(d.records[ds] || { ex: null, ext: '', fund: null, note: '' }); } return arr; }
function weekExCount(wid) { return weekData(wid).filter(d => d.ex === 'done').length; }
function monthKey(date) { return date.getFullYear()+'-'+String(date.getMonth()+1).padStart(2,'0'); }
function monthData(mk) { const d = load(); const arr = []; for (const [ds, v] of Object.entries(d.records)) { if (ds.startsWith(mk)) arr.push({ date: ds, ...v }); } return arr.sort((a,b) => a.date.localeCompare(b.date)); }

// ====== 课表数据 ======
const SCHEDULE = {
  days: ['周一','周二','周三','周四','周五'],
  classes: [
    // 周一
    [{ time: '09:55', cls: '高二7班' }, { time: '11:30', cls: '高二3班' }],
    // 周二
    [{ time: '08:00', cls: '高二3班' }, { time: '08:50', cls: '高二3班' }],
    // 周三
    [{ time: '08:00', cls: '高二3班' }, { time: '08:50', cls: '高二3班' }, { time: '10:45', cls: '高二7班' }],
    // 周四
    [{ time: '10:45', cls: '高二7班' }, { time: '11:30', cls: '高二3班' }],
    // 周五
    [{ time: '14:40', cls: '高二3班' }, { time: '16:20', cls: '高二7班' }, { time: '17:00', cls: '高二7班' }]
  ]
};

// ====== 状态 ======
let curWeek = getWeekId(new Date());
const today = fmtDate(new Date());
let selEx = '';
let selFund = '';

const $ = id => document.getElementById(id);
const progressGrid = $('progressGrid');
const progressCount = $('progressCount');
const weekLabelEl = $('weekLabel');
const todayDate = $('todayDate');
const todayGreeting = $('todayGreeting');
const toast = $('toast');

let toTimer;
function showToast(msg) { toast.textContent = msg; toast.classList.add('show'); clearTimeout(toTimer); toTimer = setTimeout(() => toast.classList.remove('show'), 2000); }

// ====== 课表渲染 ======
function renderSchedule() {
  const tbody = $('scheduleBody');
  tbody.innerHTML = '';
  const now = new Date();
  const todayIdx = now.getDay() - 1; // 0=周一..4=周五

  // 找出最多几节课
  const maxRows = Math.max(...SCHEDULE.classes.map(c => c.length));
  for (let r = 0; r < maxRows; r++) {
    const tr = document.createElement('tr');
    for (let d = 0; d < 5; d++) {
      const td = document.createElement('td');
      if (d === todayIdx && todayIdx >= 0 && todayIdx < 5) td.className = 'today-col';
      const cls = SCHEDULE.classes[d];
      if (r < cls.length) {
        td.innerHTML = '<div class="class-item"><span class="time">'+cls[r].time+'</span><br>'+cls[r].cls+'</div>';
      } else if (r === 0 && cls.length === 0) {
        td.innerHTML = '<div class="no-class">-</div>';
      }
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
}

// ====== 周视图 ======
function updateWeek() {
  const cnt = weekExCount(curWeek);
  const items = progressGrid.querySelectorAll('.progress-item');
  items.forEach((el, i) => {
    if (i < cnt) { el.classList.add('done'); el.querySelector('.check').textContent = '✓'; }
    else { el.classList.remove('done'); el.querySelector('.check').textContent = ''; }
  });
  progressCount.textContent = cnt;
  weekLabelEl.textContent = weekLabel(curWeek);
}

// ====== 今日视图 ======
function updateToday() {
  const dd = getDay(today);
  const wds = ['日','一','二','三','四','五','六'];
  const d = new Date(today+'T00:00:00');
  const parts = today.split('-');
  todayDate.textContent = parts[0]+'年'+parseInt(parts[1])+'月'+parseInt(parts[2])+'日 周'+wds[d.getDay()];
  const h = new Date().getHours();
  if (h < 9) todayGreeting.textContent = '🌤 早上好呀，新的一天开始啦！';
  else if (h < 12) todayGreeting.textContent = '☀️ 上午好，今天也要加油哦！';
  else if (h < 14) todayGreeting.textContent = '🌻 中午好，别忘了休息一下～';
  else if (h < 18) todayGreeting.textContent = '🌿 下午好，离下班又近了一步！';
  else todayGreeting.textContent = '🌙 晚上好，今天辛苦了！';

  selEx = dd.ext || '';
  document.querySelectorAll('.ex-btn').forEach(b => b.classList.toggle('active', b.dataset.type === selEx));
  const btnEx = $('btnExercise');
  if (dd.ex === 'done') {
    btnEx.textContent = '✅ 今天已运动 ('+(dd.ext||'运动')+')'; btnEx.disabled = true; btnEx.className = 'btn-primary btn-gray';
  } else {
    btnEx.textContent = '✅ 记录今天运动'; btnEx.disabled = !selEx; btnEx.className = 'btn-primary btn-green';
  }

  selFund = dd.fund || '';
  document.querySelectorAll('.fund-btn').forEach(b => { b.classList.remove('active-done','active-not'); if (dd.fund === 'done' && b.dataset.fund === 'done') b.classList.add('active-done'); if (dd.fund === 'not' && b.dataset.fund === 'not') b.classList.add('active-not'); });
  const btnFund = $('btnFund');
  if (dd.fund) {
    btnFund.textContent = dd.fund === 'done' ? '💰 已处理基金' : '😅 今天忘了基金'; btnFund.disabled = true; btnFund.className = 'btn-primary btn-gray';
  } else {
    btnFund.textContent = '📈 记录基金状态'; btnFund.disabled = !selFund; btnFund.className = 'btn-primary btn-blue';
  }

  $('noteInput').value = dd.note || '';
  renderFlowers();
}

// ====== 总结 ======
function renderSummary() {
  const wd = weekData(curWeek);
  const wsEx = wd.filter(d => d.ex === 'done').length;
  const wsFund = wd.filter(d => d.fund === 'done').length;
  const wsNotes = wd.filter(d => d.note).length;
  $('wsEx').textContent = wsEx;
  $('wsFund').textContent = wsFund;
  $('wsNotes').textContent = wsNotes;
  const wsList = $('wsNotesList');
  wsList.innerHTML = '';
  const s = new Date(curWeek+'T00:00:00');
  const wds = ['日','一','二','三','四','五','六'];
  let hasNotes = false;
  wd.forEach((d, i) => {
    if (d.note) {
      hasNotes = true;
      const dd = new Date(s); dd.setDate(dd.getDate()+i);
      const ds = fmtDate(dd);
      const div = document.createElement('div');
      div.className = 'summary-note-item';
      const tags = [];
      if (d.ex === 'done') tags.push('<span class="tag tag-green">🏃</span>');
      if (d.fund === 'done') tags.push('<span class="tag tag-blue">💰</span>');
      else if (d.fund === 'not') tags.push('<span class="tag tag-orange">😅</span>');
      div.innerHTML = '<span class="date">'+(dd.getMonth()+1)+'/'+dd.getDate()+' 周'+wds[dd.getDay()]+' '+tags.join('')+'</span>'+d.note;
      wsList.appendChild(div);
    }
  });
  if (!hasNotes) wsList.innerHTML = '<div class="summary-empty">本周还没有笔记 ✏️</div>';

  // 本月
  const mk = monthKey(new Date());
  const md = monthData(mk);
  const msEx = md.filter(d => d.ex === 'done').length;
  const msFund = md.filter(d => d.fund === 'done').length;
  const msNotes = md.filter(d => d.note).length;
  $('msEx').textContent = msEx;
  $('msFund').textContent = msFund;
  $('msNotes').textContent = msNotes;
  const msList = $('msNotesList');
  msList.innerHTML = '';
  const wds2 = ['日','一','二','三','四','五','六'];
  let hasMNotes = false;
  md.slice().reverse().forEach(d => {
    if (d.note) {
      hasMNotes = true;
      const dd = new Date(d.date+'T00:00:00');
      const div = document.createElement('div');
      div.className = 'summary-note-item';
      const tags = [];
      if (d.ex === 'done') tags.push('<span class="tag tag-green">🏃</span>');
      if (d.fund === 'done') tags.push('<span class="tag tag-blue">💰</span>');
      else if (d.fund === 'not') tags.push('<span class="tag tag-orange">😅</span>');
      div.innerHTML = '<span class="date">'+(dd.getMonth()+1)+'/'+dd.getDate()+' 周'+wds2[dd.getDay()]+' '+tags.join('')+'</span>'+d.note;
      msList.appendChild(div);
    }
  });
  if (!hasMNotes) msList.innerHTML = '<div class="summary-empty">本月还没有笔记 ✏️</div>';
}

// ====== 事件 ======
document.querySelectorAll('.ex-btn').forEach(b => {
  b.addEventListener('click', () => {
    const dd = getDay(today);
    if (dd.ex === 'done') return;
    const t = b.dataset.type;
    if (selEx === t) { selEx = ''; b.classList.remove('active'); }
    else { document.querySelectorAll('.ex-btn').forEach(x => x.classList.remove('active')); selEx = t; b.classList.add('active'); }
    const btnEx = $('btnExercise'); btnEx.disabled = !selEx; btnEx.className = 'btn-primary btn-green';
  });
});
$('btnExercise').addEventListener('click', () => {
  if (!selEx) return;
  setDay(today, 'ex', 'done'); setDay(today, 'ext', selEx);
  updateToday(); updateWeek(); renderSummary();
  showToast('🌱 已记录 '+selEx+'！本周 '+weekExCount(curWeek)+'/4');
});

document.querySelectorAll('.fund-btn').forEach(b => {
  b.addEventListener('click', () => {
    const dd = getDay(today);
    if (dd.fund) return;
    const v = b.dataset.fund; selFund = v;
    document.querySelectorAll('.fund-btn').forEach(x => x.classList.remove('active-done','active-not'));
    b.classList.add(v === 'done' ? 'active-done' : 'active-not');
    $('btnFund').disabled = false; $('btnFund').className = 'btn-primary btn-blue';
  });
});
$('btnFund').addEventListener('click', () => {
  if (!selFund) return;
  setDay(today, 'fund', selFund);
  updateToday(); renderSummary();
  showToast(selFund === 'done' ? '💰 基金已处理！' : '😅 明天别忘了哦～');
});

$('btnSaveNote').addEventListener('click', () => {
  const t = $('noteInput').value.trim();
  if (!t) { showToast('📝 写点什么再保存吧～'); return; }
  setDay(today, 'note', t); renderSummary();
  showToast('🌱 笔记已保存 ✅');
});

$('prevWeek').addEventListener('click', () => { const d = new Date(curWeek+'T00:00:00'); d.setDate(d.getDate()-7); curWeek = fmtDate(d); updateWeek(); renderSummary(); });
$('nextWeek').addEventListener('click', () => { const d = new Date(curWeek+'T00:00:00'); d.setDate(d.getDate()+7); curWeek = fmtDate(d); updateWeek(); renderSummary(); });

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    $(btn.dataset.tab).classList.add('active');
  });
});

$('btnExport').addEventListener('click', () => {
  const data = load();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = '臻日记_'+today+'.json';
  a.click(); URL.revokeObjectURL(url);
  showToast('📤 已导出！发微信给我就能读到 ✅');
});

// 导入数据（恢复备份）
const importInput = document.createElement('input');
importInput.type = 'file';
importInput.accept = '.json';
importInput.style.display = 'none';
document.body.appendChild(importInput);
importInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (imported && imported.records) {
        localStorage.setItem(KEY, JSON.stringify(imported));
        showToast('✅ 数据已恢复！刷新页面查看');
        setTimeout(() => location.reload(), 1000);
      } else {
        showToast('❌ 文件格式不对');
      }
    } catch { showToast('❌ 文件格式不对'); }
  };
  reader.readAsText(file);
  importInput.value = '';
});

// 在导出按钮旁加个导入按钮
const exportBtn = $('btnExport');
const importBtn = document.createElement('button');
importBtn.className = 'btn-export';
importBtn.textContent = '📥 恢复备份';
importBtn.style.marginLeft = '8px';
importBtn.addEventListener('click', () => importInput.click());
exportBtn.parentNode.insertBefore(importBtn, exportBtn.nextSibling);

// ====== 花朵日历 ======
function renderFlowers() {
  const s = new Date(curWeek+'T00:00:00');
  const slots = document.querySelectorAll('.flower-slot');
  const wd = weekData(curWeek);
  const flowers = ['🌸','🌺','🌻','🌹','🌷','🌼','💐','🏵️'];
  wd.forEach((d, i) => {
    if (i < slots.length) {
      const icon = slots[i].querySelector('.flower-icon');
      if (d.ex === 'done') {
        const count = wd.slice(0, i+1).filter(x => x.ex === 'done').length;
        icon.textContent = flowers[(count - 1) % flowers.length];
      } else {
        icon.textContent = '';
      }
      const todayDay = new Date().getDay();
      const slotDay = i + 1;
      slots[i].style.background = (slotDay === todayDay) ? '#eef7ee' : '#fafcfa';
    }
  });
}

// ====== 初始化 ======
renderSchedule();
updateWeek();
updateToday();
renderSummary();
renderFlowers();

setInterval(() => { const now = fmtDate(new Date()); if (now !== today) location.reload(); }, 60000);
</script>
</body>
